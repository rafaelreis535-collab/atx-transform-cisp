version: 0.2

env:
  variables:
    PROJECT_PATH: "./banking-example"

phases:
  install:
    runtime-versions:
      nodejs: 18
      python: 3.11
    commands:
      - echo "Preparing environment..."
      - ls -la

      - echo "Setting up ATX runtime..."
      - chmod -R +x atx-runtime
      - export PATH=$PWD/atx-runtime:$PATH

      - echo "Validating ATX..."
      - which atx
      - atx --version || true

  pre_build:
    commands:
      - echo "Checking project structure..."
      - ls -la
      - ls -la $PROJECT_PATH

  build:
    commands:
      - echo "Running ATX transformation..."
      - atx custom def exec -n VisualAge-COBOL-to-Java-Modernization -p $PROJECT_PATH --configuration '{"additionalPlanContext":"Convert COBOL to java preserving behavior"}' -x -t

  post_build:
    commands:
      - echo "Build finished"
      - echo "Preparing artifacts..."
      - mkdir -p output
      - cp -r $PROJECT_PATH output/
      - ls -R output

artifacts:
  files:
    - 'output/**/*'
  name: atx-transform-output