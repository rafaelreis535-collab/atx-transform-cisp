version: 0.2

env:
  variables:
    PROJECT_PATH: "./Cisp-master"

phases:
  install:
    runtime-versions:
      nodejs: 18
      python: 3.11
    commands:
      - echo "Preparing environment..."
      - echo "Listing root files"
      - ls -la

      - echo "Installing ATX from repository..."
      - chmod +x atx
      - mv atx /usr/local/bin/atx

      - echo "Validating ATX installation..."
      - which atx
      - atx --version

  pre_build:
    commands:
      - echo "Checking project structure..."
      - ls -la
      - ls -la $PROJECT_PATH

  build:
    commands:
      - echo "Running ATX transformation..."
      - atx custom def exec \
        -n COBOL-to-Python-Modernization \
        -p $PROJECT_PATH \
        --configuration '{"additionalPlanContext":"Convert COBOL Cisp interpreter to Python preserving behavior"}' \
        -x -t

  post_build:
    commands:
      - echo "Build finished"
      - echo "Listing all generated files..."
      - ls -R