version: 0.2

env:
  variables:
    PROJECT_PATH: "./banking-example"
    MODERNIZATION_API_URL: "https://aic-modernization-api.compass.uol/"
    MODERNIZATION_OUTPUT_LANGUAGE: "en_US"
  secrets-manager:
    MODERNIZATION_API_KEY: "aic-modernization:api-key"
    MODERNIZATION_ORG_ID: "aic-modernization:org-id"
  # Optional: Uncomment to use specific LLM provider/model
  # parameter-store:
  #   MODERNIZATION_LLM_PROVIDER: "/codebuild/modernization/llm-provider"
  #   MODERNIZATION_LLM_MODEL: "/codebuild/modernization/llm-model"

phases:
  install:
    runtime-versions:
      nodejs: 18
      python: 3.11
    commands:
      - echo "Preparing environment..."
      - ls -la

      - echo "Installing Python dependencies..."
      - pip install --upgrade pip
      - pip install mcp requests pyyaml

      - echo "Setting up ATX runtime..."
      - chmod -R +x atx-runtime
      - export PATH=$PWD/atx-runtime:$PATH

      - echo "Validating ATX..."
      - which atx
      - atx --version || true

  pre_build:
    commands:
      - echo "Checking project structure..."
      - ls -la
      - ls -la $PROJECT_PATH

  build:
    commands:
      - echo "Running ATX transformation..."
      - atx custom def exec -n VisualAge-COBOL-to-Java-Modernization -p $PROJECT_PATH --configuration '{"additionalPlanContext":"Convert COBOL to java preserving behavior"}' -x -t

  post_build:
    commands:
      - echo "Build finished"
      
      - echo "Generating documentation via AI Cockpit Modernization API..."
      - python automate_from_buildspec.py --buildspec ./buildspec.yml --output-dir ./output
      
      - echo "Preparing artifacts..."
      - mkdir -p output
      - cp -r $PROJECT_PATH output/ || true
      - ls -R output

artifacts:
  files:
    - 'output/**/*'
  name: atx-transform-output