version: 0.2

env:
  variables:
    PROJECT_PATH: "./Cisp-master"

phases:
  install:
    runtime-versions:
      nodejs: 18
      python: 3.11
    commands:
      - echo "Preparing environment..."
      - ls -la

      - echo "Setting up ATX runtime..."
      - chmod -R +x atx-runtime

      # 👉 CRÍTICO: usar o diretório completo
      - export PATH=$PWD/atx-runtime:$PATH

      - echo "Validating ATX..."
      - which atx
      - atx --version || true

  pre_build:
    commands:
      - echo "Checking project..."
      - ls -la $PROJECT_PATH

  build:
    commands:
      - echo "Running ATX transformation..."
      - atx custom def exec \
        -n COBOL-to-Python-Modernization \
        -p $PROJECT_PATH \
        --configuration '{"additionalPlanContext":"Convert COBOL Cisp interpreter to Python preserving behavior"}' \
        -x -t

  post_build:
    commands:
      - echo "Build finished"
      - ls -R